name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-linux:
    name: Linux (RPC=${{ matrix.rpc }})
    strategy:
      fail-fast: false
      matrix:
        rpc: [ON, OFF]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DMINICORE_OSAL_PLATFORM=LINUX \
            -DMINICORE_ENABLE_RPC=${{ matrix.rpc }} \
            -DMINICORE_BUILD_TESTS=ON \
            -DMINICORE_BUILD_EXAMPLES=ON \
            -DMINICORE_EXECUTABLE_OUTPUT_DIR="${{ github.workspace }}/output-ci"

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Verify install layout
        run: |
          cmake --install build --prefix "${{ github.workspace }}/install-root"
          test -f install-root/lib/libminicore.a

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: minicore-linux-rpc-${{ matrix.rpc }}
          path: |
            build/libminicore.a
            output-ci/
          if-no-files-found: warn
